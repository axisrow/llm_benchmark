<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Benchmark — Результаты тестов</title>
    <link rel="icon" href="./favicon.ico" sizes="any">
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">
    <link rel="manifest" href="./site.webmanifest">
    <script src="./assets/app.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./assets/app.css">
</head>
<body>
    <header class="app-header">
        <div class="container py-3 d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3">
            <a class="app-brand text-decoration-none" href="index.html">LLM Benchmark</a>
            <div class="d-flex flex-column flex-sm-row align-items-sm-center gap-3">
                <div class="app-subtitle small">Результаты тестирования моделей кодирования</div>
                <div class="theme-switcher dropdown">
                    <button class="btn btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Тема: <span data-theme-label>Авто</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><button class="dropdown-item" type="button" data-bs-theme-value="light" data-theme-label="Светлая">Светлая</button></li>
                        <li><button class="dropdown-item" type="button" data-bs-theme-value="dark" data-theme-label="Темная">Темная</button></li>
                        <li><button class="dropdown-item" type="button" data-bs-theme-value="auto" data-theme-label="Авто">Авто</button></li>
                    </ul>
                </div>
            </div>
        </div>
    </header>

    <main class="container page-shell">
        <div class="mb-4">
            <div class="page-eyebrow mb-2">Dashboard</div>
            <h1 class="page-title mb-2">Сравнение моделей и прогонов</h1>
            <p class="app-subtitle mb-0">Сводка по проектам, статусам, стоимости и времени выполнения.</p>
        </div>

        <div id="content" class="loading">
            <div class="premium-card p-5 text-center">Загружаю данные...</div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
        const UI = window.BenchmarkUI;

        async function loadData() {
            const content = document.getElementById('content');
            try {
                const response = await fetch('./data/index.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                renderDashboard(data);
            } catch (err) {
                UI.setLoaded(content);
                content.innerHTML =
                    `<div class="error">Ошибка загрузки данных: ${UI.escapeHtml(err.message)}</div>`;
            }
        }

        function renderMetric(value, label, className = '') {
            return `<div class="col">
                <div class="metric-card premium-card h-100 p-3">
                    <div class="metric-label mb-3">${UI.escapeHtml(label)}</div>
                    <div class="metric-value ${className}">${value}</div>
                </div>
            </div>`;
        }

        function renderCompactRankingRows(ranking) {
            return ranking.map((entry, index) => {
                const extraClass = index >= 10 ? ' class="ranking-extra-row d-none"' : '';
                let badge = '';
                if (entry.status === 'unstable') {
                    const projects = (entry.unstable_projects || []).join(', ');
                    const reason = entry.unstable_reason ? ` — ${entry.unstable_reason}` : '';
                    const title = projects
                        ? `нестабильна на: ${projects}${reason}`
                        : `нестабильна${reason}`;
                    badge = ` <span class="spec-badge spec-badge-unstable" title="${UI.escapeHtml(title)}">unstable</span>`;
                }
                return `<tr${extraClass}>
                    <td class="ranking-rank">${UI.escapeHtml(entry.rank)}</td>
                    <td><span class="model-name">${UI.escapeHtml(entry.model)}</span>${badge}</td>
                    <td>${UI.escapeHtml(entry.provider)}</td>
                    <td class="comparison-time">${UI.fmtSecs(entry.avg_elapsed)}</td>
                    <td>${UI.fmtInt(entry.successful_run_count)}</td>
                </tr>`;
            }).join('');
        }

        function renderModelRanking(ranking) {
            if (!ranking.length) return '';
            const hasExtra = ranking.length > 10;
            return `<section class="mb-5">
                <div class="ranking-header d-flex flex-column flex-md-row align-items-start align-items-md-end justify-content-between gap-3 mb-3">
                    <div>
                        <h2 class="section-heading mb-1">Рейтинг моделей</h2>
                        <div class="app-subtitle small">Модели без таймаутов и ошибок в актуальных отчётах. Модели с бейджем <span class="spec-badge spec-badge-unstable">unstable</span> стабильны лишь в части задач — их средние считаются только по стабильным проектам.</div>
                    </div>
                </div>
                <div class="table-card premium-card">
                    <div class="table-responsive">
                        <table class="benchmark-table ranking-table table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Модель</th>
                                    <th>Провайдер</th>
                                    <th>Ср. время</th>
                                    <th>Успешные run-ы</th>
                                </tr>
                            </thead>
                            <tbody id="rankingBody">${renderCompactRankingRows(ranking)}</tbody>
                        </table>
                    </div>
                </div>
                ${hasExtra ? `<div class="d-flex justify-content-center mt-3">
                    <button id="rankingToggle" class="ranking-toggle btn btn-sm" type="button" aria-expanded="false" aria-controls="rankingBody">
                        <span data-ranking-toggle-label>Показать все</span>
                        <span class="ranking-toggle-icon" aria-hidden="true"></span>
                    </button>
                </div>` : ''}
            </section>`;
        }

        function initRankingToggle() {
            const button = document.getElementById('rankingToggle');
            if (!button) return;
            const extraRows = document.querySelectorAll('.ranking-extra-row');
            const label = button.querySelector('[data-ranking-toggle-label]');
            button.addEventListener('click', () => {
                const expanded = button.getAttribute('aria-expanded') === 'true';
                const nextExpanded = !expanded;
                extraRows.forEach((row) => row.classList.toggle('d-none', !nextExpanded));
                button.setAttribute('aria-expanded', String(nextExpanded));
                button.classList.toggle('is-expanded', nextExpanded);
                if (label) label.textContent = nextExpanded ? 'Скрыть' : 'Показать все';
            });
        }

        function renderDashboardSummary(summary) {
            return `
                <section class="mb-5">
                    <div class="mb-3">
                        <h2 class="section-heading mb-1">Общая статистика</h2>
                        <div class="app-subtitle small">По всей базе, включая модели из denylist; рейтинг ниже фильтрует исключенные модели.</div>
                    </div>
                    <div class="row row-cols-2 row-cols-md-4 g-3">
                        ${renderMetric(summary.project_count ?? 0, 'Проектов')}
                        ${renderMetric(summary.model_count ?? 0, 'Моделей')}
                        ${renderMetric(summary.run_count ?? 0, 'Прогонов')}
                        ${renderMetric(summary.ok ?? 0, 'Успешных', 'status-ok')}
                        ${renderMetric(summary.timeout ?? 0, 'Таймаутов', 'status-timeout')}
                        ${renderMetric(summary.error ?? 0, 'Ошибок', 'status-error')}
                        ${renderMetric(summary.rate_limited ?? 0, 'Лимитов', 'status-rate-limited')}
                        ${renderMetric(UI.fmtInt(summary.total_tokens), 'Токенов')}
                        ${renderMetric(UI.formatUsdCost(summary.estimated_cost_usd), 'Стоимость')}
                    </div>
                </section>
            `;
        }

        function renderDashboard(data) {
            const content = document.getElementById('content');
            UI.setLoaded(content);
            const projects = data.projects || [];
            const summary = data.dashboard_summary || {};
            const hasDashboardSummary = (summary.report_count ?? 0) > 0;
            let html = '';

            if (projects.length > 0 || hasDashboardSummary) {
                html = renderDashboardSummary(summary);
            }

            if (projects.length === 0) {
                content.innerHTML = html
                    ? `${html}<div class="empty-state premium-card p-5 text-center">Нет видимых проектов для отображения</div>`
                    : '<div class="empty-state premium-card p-5 text-center">Нет данных для отображения</div>';
                return;
            }

            html += renderModelRanking(data.model_ranking || []);

            html += `<section>
                <div class="d-flex align-items-end justify-content-between gap-3 mb-3">
                    <div>
                        <h2 class="section-heading mb-1">Проекты</h2>
                        <div class="app-subtitle small">Откройте проект, чтобы посмотреть таблицу моделей и детали прогонов.</div>
                    </div>
                </div>
                <div class="row row-cols-1 row-cols-lg-3 g-3">`;

            projects.forEach(project => {
                const description = project.description || 'Описание не задано';
                const rate = UI.successRate(project.summary, project.run_count);
                const status = UI.summaryStatus(project.summary, project.run_count);
                html += `<div class="col">
                    <a class="project-card premium-card premium-card-hover d-flex flex-column p-4" href="${UI.projectHref(project.name)}">
                        <div class="d-flex align-items-start justify-content-between gap-3 mb-3">
                            <h3 class="project-card-title h5 mb-0">${UI.escapeHtml(project.name)}</h3>
                            <span class="badge rounded-pill ${status.badgeClass}">${rate}% OK</span>
                        </div>
                        <p class="project-description flex-grow-1 mb-4">${UI.escapeHtml(description)}</p>
                        <div class="meta-grid">
                            <div class="meta-item">
                                <div class="meta-label">Модели</div>
                                <div class="meta-value">${project.model_count}</div>
                            </div>
                            <div class="meta-item">
                                <div class="meta-label">Прогоны</div>
                                <div class="meta-value">${project.run_count}</div>
                            </div>
                            <div class="meta-item">
                                <div class="meta-label">Статус</div>
                                <div class="meta-value ${status.className}">${status.shortLabel}</div>
                            </div>
                        </div>
                    </a>
                </div>`;
            });

            html += '</div></section>';
            content.innerHTML = html;
            initRankingToggle();
        }

        loadData();
    </script>
</body>
</html>
