<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Benchmark — Проект</title>
    <link rel="icon" href="./favicon.ico" sizes="any">
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">
    <link rel="manifest" href="./site.webmanifest">
    <script src="./assets/app.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./assets/app.css">
</head>
<body>
    <header class="app-header">
        <div class="container py-3 d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3">
            <a class="app-brand text-decoration-none" href="index.html">LLM Benchmark</a>
            <div class="d-flex flex-column flex-sm-row align-items-sm-center gap-3">
                <div id="subtitle" class="app-subtitle small">Страница проекта</div>
                <div class="theme-switcher dropdown">
                    <button class="btn btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Тема: <span data-theme-label>Авто</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><button class="dropdown-item" type="button" data-bs-theme-value="light" data-theme-label="Светлая">Светлая</button></li>
                        <li><button class="dropdown-item" type="button" data-bs-theme-value="dark" data-theme-label="Темная">Темная</button></li>
                        <li><button class="dropdown-item" type="button" data-bs-theme-value="auto" data-theme-label="Авто">Авто</button></li>
                    </ul>
                </div>
            </div>
        </div>
    </header>

    <main class="container page-shell">
        <div class="mb-4">
            <a class="small fw-semibold text-decoration-none" href="index.html">← назад к проектам</a>
            <div class="page-eyebrow mt-4 mb-2">Project report</div>
            <h1 id="projectTitle" class="page-title mb-2">Проект</h1>
            <p class="app-subtitle mb-0">Сравнение моделей, стоимость и детализация копий запуска.</p>
        </div>

        <div id="content" class="loading">
            <div class="premium-card p-5 text-center">Загружаю данные...</div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
        const UI = window.BenchmarkUI;

        function getProjectName() {
            return new URLSearchParams(location.search).get('p') || '';
        }

        async function loadData() {
            const name = getProjectName();
            const content = document.getElementById('content');
            try {
                const response = await fetch('./data/index.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                const project = (data.projects || []).find(p => p.name === name);
                if (!project) {
                    UI.setLoaded(content);
                    content.innerHTML =
                        `<div class="error">Проект «${UI.escapeHtml(name)}» не найден</div>`;
                    return;
                }
                renderProject(project);
            } catch (err) {
                UI.setLoaded(content);
                content.innerHTML =
                    `<div class="error">Ошибка загрузки данных: ${UI.escapeHtml(err.message)}</div>`;
            }
        }

        function renderProjectInfo(project) {
            const hasProjectInfo = project.description ||
                (project.what_it_tests && project.what_it_tests.length);
            if (!hasProjectInfo) return '';

            const checks = (project.what_it_tests || []).map(item =>
                `<li class="list-group-item">${UI.escapeHtml(item)}</li>`
            ).join('');

            return `<section class="premium-card p-4 mb-4">
                <div class="row g-4">
                    <div class="col-lg-7">
                        <div class="page-eyebrow mb-2">О проекте</div>
                        <p class="mb-0">${UI.escapeHtml(project.description || '')}</p>
                    </div>
                    <div class="col-lg-5">
                        <div class="page-eyebrow mb-2">Что проверяет</div>
                        <ul class="summary-list list-group list-group-flush">${checks}</ul>
                    </div>
                </div>
            </section>`;
        }

        function renderPrompt(project) {
            if (!project.prompt) return '';
            return `<section class="premium-card p-4 mb-5">
                <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
                    <h2 class="section-heading mb-0">Задание</h2>
                    <span class="spec-badge">spec</span>
                </div>
                <div class="task-text">${UI.renderPromptText(project.prompt)}</div>
            </section>`;
        }

        function comparisonRows(rows, mode) {
            const sorted = [...rows];
            const compareNumeric = (a, b, direction = 1) => {
                const aOk = typeof a === 'number' && isFinite(a);
                const bOk = typeof b === 'number' && isFinite(b);
                if (!aOk && !bOk) return 0;
                if (!aOk) return 1;
                if (!bOk) return -1;
                return (a - b) * direction;
            };
            if (mode === 'avg') sorted.sort((a, b) => compareNumeric(a.avg, b.avg));
            else if (mode === 'avg-desc') sorted.sort((a, b) => compareNumeric(a.avg, b.avg, -1));
            else if (mode === 'min') sorted.sort((a, b) => compareNumeric(a.min, b.min));
            else if (mode === 'max') sorted.sort((a, b) => compareNumeric(a.max, b.max));
            else if (mode === 'price') sorted.sort((a, b) => {
                const pa = a.report.pricing?.prompt_per_1m ?? Infinity;
                const pb = b.report.pricing?.prompt_per_1m ?? Infinity;
                return pa - pb;
            });

            return sorted.map(({ report, avg, min, max }) => {
                const summary = report.summary || {};
                const rate = UI.successRate(summary, report.copies);
                const status = UI.summaryStatus(summary, report.copies);
                const hasElapsed = [min, max, avg].every(v => typeof v === 'number' && isFinite(v));
                const timeDisplay = hasElapsed
                    ? `${UI.fmtSecs(min)} &ndash; ${UI.fmtSecs(max)} <span class="text-muted-soft">(ср. ${UI.fmtSecs(avg)})</span>`
                    : 'N/A';
                const tokensDisplay = UI.fmtInt(report.usage_summary?.total_tokens);
                const costDisplay = UI.formatUsdCost(report.usage_summary?.estimated_cost_usd);
                return `<tr>
                    <td><span class="model-name">${UI.escapeHtml(report.model)}</span></td>
                    <td>${UI.escapeHtml(report.provider)}</td>
                    <td>
                        <span class="badge rounded-pill ${status.badgeClass}">${status.label}</span>
                        <span class="ms-2 text-muted-soft">${rate}%</span>
                    </td>
                    <td>${UI.formatPrice(report.pricing)}</td>
                    <td>${tokensDisplay}</td>
                    <td>${costDisplay}</td>
                    <td class="comparison-time">${timeDisplay}</td>
                </tr>`;
            }).join('');
        }

        function renderComparison(reports) {
            return `<section class="mb-5">
                <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3 mb-3">
                    <div>
                        <h2 class="section-heading mb-1">Сравнение моделей</h2>
                        <div class="app-subtitle small">Одна строка — одна модель; бейдж статуса — итог отчёта. Покопийные таймауты/ошибки см. в «Деталях прогонов» ниже. Сортировка влияет только на эту таблицу.</div>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <label class="control-label" for="sortSelect">Сортировка</label>
                        <select id="sortSelect" class="form-select form-select-sm w-auto">
                            <option value="date">по дате</option>
                            <option value="avg">среднее время ↑</option>
                            <option value="avg-desc">среднее время ↓</option>
                            <option value="min">лучшее время ↑</option>
                            <option value="max">худшее время ↑</option>
                            <option value="price">цена prompt ↑</option>
                        </select>
                    </div>
                </div>
                <div class="table-card premium-card">
                    <div class="table-responsive">
                        <table class="benchmark-table table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>Модель</th>
                                    <th>Провайдер</th>
                                    <th>Статус</th>
                                    <th>Цена за 1M токенов</th>
                                    <th>Токены</th>
                                    <th>Стоимость</th>
                                    <th>Время</th>
                                </tr>
                            </thead>
                            <tbody id="comparisonBody"></tbody>
                        </table>
                    </div>
                </div>
            </section>`;
        }

        // --- issue #83: рендер planning-секции ---
        //
        // Planning-секция живёт ВНУТРИ карточки отчёта, после плиток копий, в
        // компактном сворачиваемом <details data-planning-section> (свёрнут по
        // умолчанию). Появляется только у planning-отчётов (есть ключ planning).
        // Все LLM-значения (header/question/options/answer/reply_error) вставляются
        // ТОЛЬКО через UI.escapeHtml — сырой HTML запрещён (XSS E2E в тестах).

        //	reply_status → {label, badgeClass}. Так же как у runStatus — существующая
        //	система badge-классов, отдельного UI-фреймворка нет.
        function planningReplyStatus(status) {
            if (status === 'replied') {
                return { label: 'Ответ отправлен', badgeClass: 'badge-status-ok' };
            }
            if (status === 'error') {
                return { label: 'Ошибка ответа', badgeClass: 'badge-status-error' };
            }
            if (status === 'captured') {
                return { label: 'Только записан', badgeClass: 'badge-status-timeout' };
            }
            return { label: 'Ожидает', badgeClass: 'badge-status-rate-limited' };
        }

        function planningOptionsHtml(question) {
            // options — список {label}. Фактический answer (массив строк) выделен
            // существующим акцентным классом .planning-option.is-selected. Каждый
            // label экранирован — сырой HTML из LLM невозможен.
            const answer = new Set((question.answer || []).map(String));
            return (question.options || [])
                .map(opt => {
                    const label = String((opt && opt.label != null ? opt.label : '') ?? '');
                    const selected = answer.has(label) ? ' is-selected' : '';
                    return `<li class="planning-option${selected}">${UI.escapeHtml(label)}</li>`;
                }).join('');
        }

        function planningQuestionHtml(question) {
            // questions-only → «Ответ не отправлялся»: либо явный captured по
            // контракту таксономии (#83/#89), либо не-error статус с пустым
            // answer. В текущем бэкенде questions-only выражается через
            // pending + пустой answer (вторая ветка), captured —
            // forward-compatible и тоже обрабатывается.
            const noAnswer = (question.reply_status === 'captured')
                || (question.reply_status !== 'error'
                    && (question.answer || []).length === 0);
            const status = planningReplyStatus(question.reply_status);
            const badges = [];
            if (question.fallback_used) {
                badges.push('<span class="badge rounded-pill badge-planning-fallback">'
                    + 'fallback → first</span>');
            }
            badges.push(`<span class="badge rounded-pill ${status.badgeClass} planning-reply-status">`
                + `${UI.escapeHtml(status.label)}</span>`);

            const header = question.header
                ? `<div class="planning-q-header">${UI.escapeHtml(question.header)}</div>`
                : '';
            // reply_error — санитизированный текст (не raw HTML).
            const errorHtml = (question.reply_status === 'error' && question.reply_error)
                ? `<div class="planning-reply-error badge-planning-error">${
                    UI.escapeHtml(question.reply_error)}</div>`
                : '';
            const answerHint = noAnswer && question.reply_status !== 'error'
                ? '<div class="planning-no-answer small text-muted-soft">Ответ не отправлялся</div>'
                : '';

            return `<div class="planning-question">
                ${header}
                <div class="planning-q-text">${UI.escapeHtml(question.question || '')}</div>
                <ul class="planning-options list-unstyled">${planningOptionsHtml(question)}</ul>
                <div class="planning-badges">${badges.join(' ')}</div>
                ${answerHint}${errorHtml}
            </div>`;
        }

        // Группировка: копия → (attempt_idx, round_idx) → список вопросов.
        function planningRunHtml(run) {
            const questions = run.questions || [];
            if (!questions.length) return '';
            const byAttempt = new Map();
            questions.forEach(q => {
                const attempt = q.attempt_idx ?? 0;
                const round = q.round_idx ?? 0;
                const key = `${attempt}:${round}`;
                if (!byAttempt.has(key)) {
                    byAttempt.set(key, { attempt, round, items: [] });
                }
                byAttempt.get(key).items.push(q);
            });
            const groups = [...byAttempt.values()].sort(
                (a, b) => a.attempt - b.attempt || a.round - b.round);

            const groupsHtml = groups.map(g => {
                const questionsHtml = g.items
                    .sort((a, b) => (a.question_idx ?? 0) - (b.question_idx ?? 0))
                    .map(planningQuestionHtml).join('');
                return `<div class="planning-group">
                    <div class="planning-group-label small text-muted-soft">`
                    + `копия ${UI.escapeHtml(run.index)} · attempt ${UI.escapeHtml(g.attempt)}`
                    + ` · round ${UI.escapeHtml(g.round)}</div>
                    ${questionsHtml}
                </div>`;
            }).join('');
            return `<div class="planning-run">${groupsHtml}</div>`;
        }

        function renderPlanningSection(report) {
            // Coding-отчёты (нет ключа planning) → секции нет вовсе.
            if (!report.planning) return '';
            const summary = report.planning_summary || {};
            const total = summary.questions ?? 0;

            // Нет ни одного вопроса во всём отчёте → empty-state.
            if (total === 0) {
                return `<details class="planning-section" data-planning-section>
                    <summary>Уточняющие вопросы <span class="text-muted-soft">(0)</span></summary>
                    <div class="planning-body planning-empty small text-muted-soft">
                        Уточняющих вопросов не было
                    </div>
                </details>`;
            }

            const responder = report.planning.responder || '';
            // Сводка в summary видна всегда: вопросы / responder / fallbacks / ошибки.
            const summaryBadges = [
                `<span class="badge rounded-pill badge-planning-count">вопросов: ${UI.escapeHtml(total)}</span>`,
                `<span class="badge rounded-pill badge-planning-meta">responder: ${UI.escapeHtml(responder)}</span>`,
                `<span class="badge rounded-pill badge-planning-fallback">fallbacks: ${UI.escapeHtml(summary.fallbacks_to_first ?? 0)}</span>`,
                `<span class="badge rounded-pill badge-planning-error">reply errors: ${UI.escapeHtml(summary.reply_errors ?? 0)}</span>`,
            ].join(' ');

            const runsHtml = (report.runs || []).map(planningRunHtml).join('');

            return `<details class="planning-section" data-planning-section>
                <summary>Уточняющие вопросы ${summaryBadges}</summary>
                <div class="planning-body">${runsHtml}</div>
            </details>`;
        }

        function renderRunDetails(reports) {
            let html = `<section>
                <div class="mb-3">
                    <h2 class="section-heading mb-1">Детали прогонов</h2>
                    <div class="app-subtitle small">Каждая карточка показывает копии одного запуска.</div>
                </div>`;

            reports.forEach(report => {
                html += `<article class="premium-card p-4 mb-3">
                    <div class="d-flex flex-column flex-xl-row justify-content-between gap-3 mb-3">
                        <h3 class="run-card-title mb-0">${UI.escapeHtml(report.model)}</h3>
                        <div class="run-meta d-flex flex-wrap gap-3">
                            <span><strong>Дата:</strong> ${UI.escapeHtml(report.started_at_display)}</span>
                            <span><strong>Провайдер:</strong> ${UI.escapeHtml(report.provider)}</span>
                            <span><strong>Копий:</strong> ${UI.escapeHtml(report.copies)}</span>
                            <span><strong>Время:</strong> ${UI.fmtSecs(report.run_elapsed)}</span>
                            <span><strong>Цена:</strong> ${UI.formatPrice(report.pricing)}</span>
                            <span><strong>Токены:</strong> ${UI.fmtInt(report.usage_summary?.total_tokens)}</span>
                            <span><strong>Стоимость:</strong> ${UI.formatUsdCost(report.usage_summary?.estimated_cost_usd)}</span>
                        </div>
                    </div>
                    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-5 g-3">`;

                (report.runs || []).forEach(run => {
                    const status = UI.runStatus(run);
                    // Причину показываем только для неуспешных копий и только если
                    // она есть (старые отчёты без reason не ломаются).
                    const reasonHtml = (run.code !== 0 && run.reason)
                        ? `<div class="run-reason mt-2" title="${UI.escapeHtml(run.reason)}">${UI.escapeHtml(run.reason)}</div>`
                        : '';
                    html += `<div class="col">
                        <div class="run-tile ${status.className} h-100">
                            <div class="run-item-label mb-2">Копия ${UI.escapeHtml(run.index)}</div>
                            <div class="run-item-value mb-1">${UI.fmtSecs(run.elapsed)}</div>
                            <div class="small text-muted-soft mb-1">${UI.fmtInt(run.usage?.total_tokens)} ток.</div>
                            <div class="small text-muted-soft mb-2">${UI.formatUsdCost(run.usage?.estimated_cost_usd)}</div>
                            <span class="badge rounded-pill ${status.badgeClass}">${UI.escapeHtml(run.status || status.label)}</span>
                            ${reasonHtml}
                        </div>
                    </div>`;
                });

                html += '</div>';

                // Planning-секция — внутри карточки, после плиток копий.
                // Появляется только у planning-отчётов (есть ключ planning).
                html += renderPlanningSection(report);

                html += '</article>';
            });

            html += '</section>';
            return html;
        }

        function renderProject(project) {
            document.getElementById('subtitle').textContent = project.name;
            document.getElementById('projectTitle').textContent = project.name;
            document.title = `LLM Benchmark — ${project.name}`;

            const content = document.getElementById('content');
            UI.setLoaded(content);
            const reports = project.reports || [];

            content.innerHTML =
                renderProjectInfo(project) +
                renderPrompt(project) +
                renderComparison(reports) +
                renderRunDetails(reports);

            const rows = reports.map(report => {
                const elapsed = (report.runs || [])
                    .map(r => r.elapsed)
                    .filter(v => typeof v === 'number' && isFinite(v));
                return {
                    report,
                    avg: elapsed.length ? elapsed.reduce((s, e) => s + e, 0) / elapsed.length : null,
                    min: elapsed.length ? Math.min(...elapsed) : null,
                    max: elapsed.length ? Math.max(...elapsed) : null,
                };
            });
            const select = document.getElementById('sortSelect');
            const tbody = document.getElementById('comparisonBody');
            const renderRows = () => { tbody.innerHTML = comparisonRows(rows, select.value); };
            select.addEventListener('change', renderRows);
            renderRows();
        }

        loadData();
    </script>
</body>
</html>
