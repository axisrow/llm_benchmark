<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Benchmark — Проект</title>
    <link rel="icon" href="./favicon.ico" sizes="any">
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">
    <link rel="manifest" href="./site.webmanifest">
    <script src="./assets/app.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./assets/app.css">
</head>
<body>
    <header class="app-header">
        <div class="container py-3 d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3">
            <a class="app-brand text-decoration-none" href="index.html">LLM Benchmark</a>
            <div class="d-flex flex-column flex-sm-row align-items-sm-center gap-3">
                <div id="subtitle" class="app-subtitle small">Страница проекта</div>
                <div class="theme-switcher dropdown">
                    <button class="btn btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Тема: <span data-theme-label>Авто</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><button class="dropdown-item" type="button" data-bs-theme-value="light" data-theme-label="Светлая">Светлая</button></li>
                        <li><button class="dropdown-item" type="button" data-bs-theme-value="dark" data-theme-label="Темная">Темная</button></li>
                        <li><button class="dropdown-item" type="button" data-bs-theme-value="auto" data-theme-label="Авто">Авто</button></li>
                    </ul>
                </div>
            </div>
        </div>
    </header>

    <main class="container page-shell">
        <div class="mb-4">
            <a class="small fw-semibold text-decoration-none" href="index.html">← назад к проектам</a>
            <div class="page-eyebrow mt-4 mb-2">Project report</div>
            <h1 id="projectTitle" class="page-title mb-2">Проект</h1>
            <p class="app-subtitle mb-0">Сравнение моделей, стоимость и детализация копий запуска.</p>
        </div>

        <div id="content" class="loading">
            <div class="premium-card p-5 text-center">Загружаю данные...</div>
        </div>

        <!-- issue #96: полноэкранный Тиндер-режим разметки неразмеченных вопросов.
             [hidden] пока режим выключен; наполнение рендерит openTinder(). -->
        <div id="tinderOverlay" class="tinder-overlay" hidden tabindex="-1"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
        const UI = window.BenchmarkUI;

        // issue #96: состояние Тиндер-режима. Текущий проект и canReview
        // запоминаются в renderProject. Есть ДВЕ точки входа:
        //   - openTinder(reportId) — поток по неразмеченным вопросам ОДНОГО отчёта
        //     (карточная кнопка в planning-секции модели);
        //   - openTinderProject()  — поток по неразмеченным вопросам ВСЕГО проекта
        //     (верхняя кнопка «Разметить вопросы проекта»).
        // Поток (список вопросов + индекс) живёт in-memory и пересобирается из
        // index.json при каждом входе (неразмеченные = без review_verdict). Каждый
        // элемент потока несёт свой prompt (промпт его отчёта) и подпись модели —
        // в проектном потоке вопросы разных моделей идут вперемешку.
        let _currentProject = null;
        let _canReview = false;
        const _tinder = { scope: null, reportId: null, questions: [], idx: 0, busy: false, gen: 0 };
        // PUT может закончиться уже после выхода и повторного входа в Тиндер.
        // Pending хранится отдельно от поколения потока: один и тот же review_key
        // нельзя снова показать/отправить, пока первый запрос ещё выполняется.
        const _pendingTinderReviews = new Set();

        function getProjectName() {
            return new URLSearchParams(location.search).get('p') || '';
        }

        // issue #93: fetch с таймаутом — для best-effort capabilities-запроса,
        // чтобы он не блокировал рендер в медленном/loopback-окружении.
        function fetchWithTimeout(url, ms) {
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), ms);
            return fetch(url, { signal: ctrl.signal })
                .finally(() => clearTimeout(timer));
        }

        async function loadData() {
            const name = getProjectName();
            const content = document.getElementById('content');
            // issue #93: best-effort GET /api/capabilities. На локальном serve
            // вернёт {question_reviews: true} — рендерим кнопки; на GitHub Pages
            // эндпоинт отсутствует (fetch упадёт/404) → canReview=false, read-only.
            // Таймаут обязателен: это best-effort запрос, он не должен блокировать
            // рендер (в медленном/loopback-окружении fetch иначе висит).
            let canReview = false;
            try {
                const resp = await fetchWithTimeout('/api/capabilities', 2000);
                if (resp.ok) {
                    const caps = await resp.json();
                    canReview = caps && caps.question_reviews === true;
                }
            } catch (_e) {
                canReview = false;
            }
            try {
                const response = await fetch('./data/index.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                const project = (data.projects || []).find(p => p.name === name);
                if (!project) {
                    UI.setLoaded(content);
                    content.innerHTML =
                        `<div class="error">Проект «${UI.escapeHtml(name)}» не найден</div>`;
                    return;
                }
                renderProject(project, canReview);
            } catch (err) {
                UI.setLoaded(content);
                content.innerHTML =
                    `<div class="error">Ошибка загрузки данных: ${UI.escapeHtml(err.message)}</div>`;
            }
        }

        // --- issue #93: обработчики кнопок ручной разметки ---
        //
        // Нажатие неактивной кнопки → PUT (поставить/заменить verdict). Выбранная
        // кнопка заблокирована: чтобы исправить оценку, выбирают противоположную.
        // DELETE остаётся в API для служебных сценариев, но UI его не вызывает.

        function attachReviewHandlers() {
            document.querySelectorAll('.planning-review').forEach(box => {
                if (box.dataset.bound === '1') return;
                box.dataset.bound = '1';
                box.querySelectorAll('.planning-review-btn').forEach(btn => {
                    btn.addEventListener('click', () => handleReviewClick(box, btn));
                });
            });
        }

        function setReviewBusy(box, busy) {
            box.dataset.busy = busy ? '1' : '0';
            syncReviewButtonsDisabled(box);
        }

        function syncReviewButtonsDisabled(box) {
            const busy = box.dataset.busy === '1';
            box.querySelectorAll('.planning-review-btn').forEach(b => {
                b.disabled = busy || b.getAttribute('aria-pressed') === 'true';
            });
        }

        function applyReviewVerdict(box, verdict) {
            // verdict: 'useful' | 'unnecessary' | null (не оценён). Обновляет
            // aria-pressed и is-selected на обеих кнопках, прячет сообщение об ошибке.
            box.querySelectorAll('.planning-review-btn').forEach(b => {
                const active = verdict !== null && b.dataset.verdict === verdict;
                b.classList.toggle('is-selected', active);
                b.setAttribute('aria-pressed', String(active));
            });
            syncReviewButtonsDisabled(box);
            const errEl = box.querySelector('.planning-review-error');
            if (errEl) {
                errEl.hidden = true;
                errEl.textContent = '';
            }
        }

        function showReviewError(box, message) {
            const errEl = box.querySelector('.planning-review-error');
            if (errEl) {
                // textContent — экранирование на уровне DOM (XSS невозможен).
                errEl.textContent = message;
                errEl.hidden = false;
            }
        }

        async function handleReviewClick(box, btn) {
            const keyRaw = box.dataset.reviewKey;
            let key;
            try { key = JSON.parse(keyRaw); } catch (_e) { return; }
            const wasActive = btn.getAttribute('aria-pressed') === 'true';
            if (wasActive) return;
            const targetVerdict = btn.dataset.verdict;

            // Запоминаем прежнее состояние для отката при ошибке.
            const prevVerdict = currentVerdict(box);

            setReviewBusy(box, true);
            // Оптимистично показываем целевое состояние, не дожидаясь ответа.
            applyReviewVerdict(box, targetVerdict);
            try {
                const body = JSON.stringify({ ...key, verdict: targetVerdict });
                const resp = await fetch('/api/question-reviews', {
                    method: 'PUT', body,
                    headers: { 'Content-Type': 'application/json' },
                });
                if (!resp.ok) {
                    let detail = `HTTP ${resp.status}`;
                    try {
                        const payload = await resp.json();
                        if (payload && payload.error) detail = payload.error;
                    } catch (_e) { /* keep HTTP status */ }
                    throw new Error(detail);
                }
                // Успех: DOM уже в целевом состоянии; пересчитываем review_summary.
                updateReviewSummaries(box, targetVerdict, prevVerdict);
                // cycle-review cycle 2: синхронизируем _currentProject и счётчики
                // Тиндера, чтобы вход в Тиндер без reload не реплеил вопрос и не
                // делал молчаливый повторный PUT поверх verdict.
                reconcileReviewVerdict(key, targetVerdict);
            } catch (err) {
                // Откат к прежнему состоянию + экранированное сообщение.
                applyReviewVerdict(box, prevVerdict);
                showReviewError(box, `Не сохранить: ${err.message}`);
            } finally {
                setReviewBusy(box, false);
            }
        }

        function currentVerdict(box) {
            const active = box.querySelector('.planning-review-btn.is-selected');
            return active ? active.dataset.verdict : null;
        }

        // Пересчёт review_summary в DOM после успешной смены verdict. Бежим по
        // всем planning-секциям, пересобираем полезных/оценено/покрытие из текущих
        // состояний кнопок внутри секции, и обновляем summary-бейджи + data-attr
        // (он же читается колонкой сравнения при следующем рендере).
        function updateReviewSummaries(changedBox, newVerdict, prevVerdict) {
            const details = changedBox.closest('.planning-section');
            if (!details) return;
            const boxes = details.querySelectorAll('.planning-review');
            let reviewed = 0, useful = 0;
            boxes.forEach(b => {
                const v = currentVerdict(b);
                if (v === 'useful') { reviewed++; useful++; }
                else if (v === 'unnecessary') { reviewed++; }
            });
            const total = details.querySelectorAll('.planning-question').length;
            const summary = {
                total,
                reviewed,
                useful,
                unnecessary: reviewed - useful,
                useful_percent: reviewed ? Math.round(useful / reviewed * 10000) / 100 : null,
                coverage_percent: total ? Math.round(reviewed / total * 10000) / 100 : 0.0,
            };
            details.dataset.reviewSummary = JSON.stringify(summary);
            // Обновим summary-бейджи разметки в шапке секции (полезных/оценено/покрытие).
            rewriteReviewSummaryBadges(details, summary);
            // И колонку «Вопросы» в таблице сравнения для модели этой карточки.
            rewriteComparisonQuestionsCell(details, summary);
        }

        function rewriteReviewSummaryBadges(details, summary) {
            const summaryEl = details.querySelector('summary');
            if (!summaryEl) return;
            // Удаляем старые review-бейджи (отмечены классом badge-planning-count,
            // но чтобы не задеть «вопросов: N», отличаем по data-review-badge).
            summaryEl.querySelectorAll('[data-review-badge]').forEach(el => el.remove());
            if (!summary.total || !summary.reviewed) return;
            const parts = [
                `полезных: ${summary.useful} / оценено: ${summary.reviewed}`,
                `покрытие ${summary.coverage_percent}%`,
            ];
            parts.forEach(t => {
                const span = document.createElement('span');
                span.className = 'badge rounded-pill badge-planning-count';
                span.dataset.reviewBadge = '1';
                span.textContent = t;
                summaryEl.appendChild(document.createTextNode(' '));
                summaryEl.appendChild(span);
            });
        }

        function rewriteComparisonQuestionsCell(details, summary) {
            // Карточка прогона содержит h3 с именем модели — по нему находим
            // строку сравнения и обновляем ячейку «Вопросы».
            const article = details.closest('article.premium-card');
            if (!article) return;
            const modelEl = article.querySelector('.run-card-title');
            if (!modelEl) return;
            const modelName = modelEl.textContent.trim();
            // Точный поиск строки по тексту модели.
            const rows = document.querySelectorAll('#comparisonBody tr');
            rows.forEach(r => {
                const name = r.querySelector('.model-name');
                if (name && name.textContent.trim() === modelName) {
                    const cell = r.querySelector('.comparison-questions');
                    if (cell) {
                        if (!summary.total || !summary.reviewed) {
                            cell.textContent = 'N/A';
                        } else {
                            cell.textContent = '';
                            const txt = document.createTextNode(
                                `${summary.useful}/${summary.reviewed} `);
                            const pct = document.createElement('span');
                            pct.className = 'text-muted-soft';
                            pct.textContent = `(${summary.coverage_percent}%)`;
                            cell.appendChild(txt);
                            cell.appendChild(pct);
                        }
                    }
                }
            });
        }

        function renderProjectInfo(project) {
            const hasProjectInfo = project.description ||
                (project.what_it_tests && project.what_it_tests.length);
            if (!hasProjectInfo) return '';

            const checks = (project.what_it_tests || []).map(item =>
                `<li class="list-group-item">${UI.escapeHtml(item)}</li>`
            ).join('');

            return `<section class="premium-card p-4 mb-4">
                <div class="row g-4">
                    <div class="col-lg-7">
                        <div class="page-eyebrow mb-2">О проекте</div>
                        <p class="mb-0">${UI.escapeHtml(project.description || '')}</p>
                    </div>
                    <div class="col-lg-5">
                        <div class="page-eyebrow mb-2">Что проверяет</div>
                        <ul class="summary-list list-group list-group-flush">${checks}</ul>
                    </div>
                </div>
            </section>`;
        }

        function renderPrompt(project) {
            if (!project.prompt) return '';
            return `<section class="premium-card p-4 mb-5">
                <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
                    <h2 class="section-heading mb-0">Задание</h2>
                    <span class="spec-badge">spec</span>
                </div>
                <div class="task-text">${UI.renderPromptText(project.prompt)}</div>
            </section>`;
        }

        // issue #96: верхняя кнопка «Разметить вопросы проекта» — открывает
        // Тиндер-поток по всем неразмеченным planning-вопросам ВСЕХ моделей
        // проекта. Только при canReview и наличии хотя бы одного неразмеченного.
        // Карточные кнопки per-отчёт (#96) остаются — точечная разметка.
        function renderTinderProjectEntry(project, canReview) {
            if (!canReview) return '';
            const total = (project.reports || [])
                .filter(r => r.planning)
                .reduce((sum, r) => sum + (r.runs || []).reduce(
                    (s, run) => s + (run.questions || []).filter(
                        q => q && q.review_key && !q.review_verdict).length, 0), 0);
            if (total === 0) return '';
            return `<section class="tinder-project-entry mb-4">
                <button type="button" id="tinderEntryProject" class="tinder-project-btn">
                    Разметить вопросы проекта (${UI.escapeHtml(total)})
                </button>
            </section>`;
        }

        function comparisonRows(rows, mode) {
            const sorted = [...rows];
            const compareNumeric = (a, b, direction = 1) => {
                const aOk = typeof a === 'number' && isFinite(a);
                const bOk = typeof b === 'number' && isFinite(b);
                if (!aOk && !bOk) return 0;
                if (!aOk) return 1;
                if (!bOk) return -1;
                return (a - b) * direction;
            };
            if (mode === 'avg') sorted.sort((a, b) => compareNumeric(a.avg, b.avg));
            else if (mode === 'avg-desc') sorted.sort((a, b) => compareNumeric(a.avg, b.avg, -1));
            else if (mode === 'min') sorted.sort((a, b) => compareNumeric(a.min, b.min));
            else if (mode === 'max') sorted.sort((a, b) => compareNumeric(a.max, b.max));
            else if (mode === 'price') sorted.sort((a, b) => {
                const pa = a.report.pricing?.prompt_per_1m ?? Infinity;
                const pb = b.report.pricing?.prompt_per_1m ?? Infinity;
                return pa - pb;
            });

            return sorted.map(({ report, avg, min, max }) => {
                const summary = report.summary || {};
                const rate = UI.successRate(summary, report.copies);
                const status = UI.summaryStatus(summary, report.copies);
                const hasElapsed = [min, max, avg].every(v => typeof v === 'number' && isFinite(v));
                const timeDisplay = hasElapsed
                    ? `${UI.fmtSecs(min)} &ndash; ${UI.fmtSecs(max)} <span class="text-muted-soft">(ср. ${UI.fmtSecs(avg)})</span>`
                    : 'N/A';
                const tokensDisplay = UI.fmtInt(report.usage_summary?.total_tokens);
                const costDisplay = UI.formatUsdCost(report.usage_summary?.estimated_cost_usd);
                return `<tr>
                    <td><span class="model-name">${UI.escapeHtml(report.model)}</span></td>
                    <td>${UI.escapeHtml(report.provider)}</td>
                    <td>
                        <span class="badge rounded-pill ${status.badgeClass}">${status.label}</span>
                        <span class="ms-2 text-muted-soft">${rate}%</span>
                    </td>
                    <td>${UI.formatPrice(report.pricing)}</td>
                    <td>${tokensDisplay}</td>
                    <td>${costDisplay}</td>
                    <td class="comparison-time">${timeDisplay}</td>
                    <td class="comparison-questions">${questionsCell(report)}</td>
                </tr>`;
            }).join('');
        }

        // issue #93: компактная колонка «Вопросы» — useful/reviewed и покрытие.
        // N/A для coding-отчётов (нет review_summary) и при reviewed=0.
        function questionsCell(report) {
            const rs = report.review_summary;
            if (!rs || !rs.total || !rs.reviewed) return 'N/A';
            const useful = rs.useful ?? 0;
            const reviewed = rs.reviewed ?? 0;
            const coverage = typeof rs.coverage_percent === 'number'
                ? rs.coverage_percent : 0;
            return `${UI.escapeHtml(useful)}/${UI.escapeHtml(reviewed)}`
                + ` <span class="text-muted-soft">(${UI.escapeHtml(coverage)}%)</span>`;
        }

        function renderComparison(reports) {
            return `<section class="mb-5">
                <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3 mb-3">
                    <div>
                        <h2 class="section-heading mb-1">Сравнение моделей</h2>
                        <div class="app-subtitle small">Одна строка — одна модель; бейдж статуса — итог отчёта. Покопийные таймауты/ошибки см. в «Деталях прогонов» ниже. Сортировка влияет только на эту таблицу.</div>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <label class="control-label" for="sortSelect">Сортировка</label>
                        <select id="sortSelect" class="form-select form-select-sm w-auto">
                            <option value="date">по дате</option>
                            <option value="avg">среднее время ↑</option>
                            <option value="avg-desc">среднее время ↓</option>
                            <option value="min">лучшее время ↑</option>
                            <option value="max">худшее время ↑</option>
                            <option value="price">цена prompt ↑</option>
                        </select>
                    </div>
                </div>
                <div class="table-card premium-card">
                    <div class="table-responsive">
                        <table class="benchmark-table table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>Модель</th>
                                    <th>Провайдер</th>
                                    <th>Статус</th>
                                    <th>Цена за 1M токенов</th>
                                    <th>Токены</th>
                                    <th>Стоимость</th>
                                    <th>Время</th>
                                    <th>Вопросы</th>
                                </tr>
                            </thead>
                            <tbody id="comparisonBody"></tbody>
                        </table>
                    </div>
                </div>
            </section>`;
        }

        // --- issue #83: рендер planning-секции ---
        //
        // Planning-секция живёт ВНУТРИ карточки отчёта, после плиток копий, в
        // компактном сворачиваемом <details data-planning-section> (свёрнут по
        // умолчанию). Появляется только у planning-отчётов (есть ключ planning).
        // Все LLM-значения (header/question/options/answer/reply_error) вставляются
        // ТОЛЬКО через UI.escapeHtml — сырой HTML запрещён (XSS E2E в тестах).

        //	reply_status → {label, badgeClass}. Так же как у runStatus — существующая
        //	система badge-классов, отдельного UI-фреймворка нет.
        function planningReplyStatus(status) {
            if (status === 'replied') {
                return { label: 'Ответ отправлен', badgeClass: 'badge-status-ok' };
            }
            if (status === 'error') {
                return { label: 'Ошибка ответа', badgeClass: 'badge-status-error' };
            }
            if (status === 'captured') {
                return { label: 'Только записан', badgeClass: 'badge-status-timeout' };
            }
            return { label: 'Ожидает', badgeClass: 'badge-status-rate-limited' };
        }

        function planningOptionsHtml(question) {
            // options — список {label}. Фактический answer (массив строк) выделен
            // существующим акцентным классом .planning-option.is-selected. Каждый
            // label экранирован — сырой HTML из LLM невозможен.
            const answer = new Set((question.answer || []).map(String));
            return (question.options || [])
                .map(opt => {
                    const label = String((opt && opt.label != null ? opt.label : '') ?? '');
                    const selected = answer.has(label) ? ' is-selected' : '';
                    return `<li class="planning-option${selected}">${UI.escapeHtml(label)}</li>`;
                }).join('');
        }

        function planningQuestionHtml(question, canReview) {
            // questions-only → «Ответ не отправлялся»: либо явный captured по
            // контракту таксономии (#83/#89), либо не-error статус с пустым
            // answer. В текущем бэкенде questions-only выражается через
            // pending + пустой answer (вторая ветка), captured —
            // forward-compatible и тоже обрабатывается.
            const noAnswer = (question.reply_status === 'captured')
                || (question.reply_status !== 'error'
                    && (question.answer || []).length === 0);
            const status = planningReplyStatus(question.reply_status);
            const badges = [];
            if (question.fallback_used) {
                badges.push('<span class="badge rounded-pill badge-planning-fallback">'
                    + 'fallback → first</span>');
            }
            badges.push(`<span class="badge rounded-pill ${status.badgeClass} planning-reply-status">`
                + `${UI.escapeHtml(status.label)}</span>`);

            const header = question.header
                ? `<div class="planning-q-header">${UI.escapeHtml(question.header)}</div>`
                : '';
            // reply_error — санитизированный текст (не raw HTML).
            const errorHtml = (question.reply_status === 'error' && question.reply_error)
                ? `<div class="planning-reply-error badge-planning-error">${
                    UI.escapeHtml(question.reply_error)}</div>`
                : '';
            const answerHint = noAnswer && question.reply_status !== 'error'
                ? '<div class="planning-no-answer small text-muted-soft">Ответ не отправлялся</div>'
                : '';

            // issue #93: кнопки ручной разметки. Рендерятся только при
            // capabilities.question_reviews === true (локальный serve); на
            // GitHub Pages canReview=false → кнопок нет, verdict read-only.
            // Ключ для API лежит в question.review_key (добавляет index_builder);
            // активный verdict — в question.review_verdict.
            const reviewHtml = canReview && question.review_key
                ? reviewButtonsHtml(question.review_key, question.review_verdict)
                : '';

            return `<div class="planning-question" data-question="${question.review_key ? UI.escapeHtml(JSON.stringify(question.review_key)) : ''}">
                ${header}
                <div class="planning-q-text">${UI.escapeHtml(question.question || '')}</div>
                <ul class="planning-options list-unstyled">${planningOptionsHtml(question)}</ul>
                <div class="planning-badges">${badges.join(' ')}</div>
                ${answerHint}${errorHtml}
                ${reviewHtml}
            </div>`;
        }

        // issue #93: пара кнопок «Полезный»/«Лишний». aria-pressed=true и класс
        // is-selected у активной; обе привязаны к одному review-key через
        // data-атрибуты. Сообщения об ошибке вставляются в .planning-review-error
        // экранированным текстом (см. handleReviewClick).
        function reviewButtonsHtml(reviewKey, verdict) {
            const keyAttr = UI.escapeHtml(JSON.stringify(reviewKey));
            const usefulActive = verdict === 'useful';
            const unnecessaryActive = verdict === 'unnecessary';
            return `<div class="planning-review" data-review-key="${keyAttr}">
                <button type="button" class="btn btn-sm planning-review-btn${usefulActive ? ' is-selected' : ''}"
                    data-verdict="useful" aria-pressed="${usefulActive}"${usefulActive ? ' disabled' : ''}>Полезный</button>
                <button type="button" class="btn btn-sm planning-review-btn${unnecessaryActive ? ' is-selected' : ''}"
                    data-verdict="unnecessary" aria-pressed="${unnecessaryActive}"${unnecessaryActive ? ' disabled' : ''}>Лишний</button>
                <span class="planning-review-error badge-planning-error" hidden></span>
            </div>`;
        }

        // Группировка: копия → (attempt_idx, round_idx) → список вопросов.
        function planningRunHtml(run, canReview) {
            const questions = run.questions || [];
            if (!questions.length) return '';
            const byAttempt = new Map();
            questions.forEach(q => {
                const attempt = q.attempt_idx ?? 0;
                const round = q.round_idx ?? 0;
                const key = `${attempt}:${round}`;
                if (!byAttempt.has(key)) {
                    byAttempt.set(key, { attempt, round, items: [] });
                }
                byAttempt.get(key).items.push(q);
            });
            const groups = [...byAttempt.values()].sort(
                (a, b) => a.attempt - b.attempt || a.round - b.round);

            const groupsHtml = groups.map(g => {
                const questionsHtml = g.items
                    .sort((a, b) => (a.question_idx ?? 0) - (b.question_idx ?? 0))
                    .map(q => planningQuestionHtml(q, canReview)).join('');
                return `<div class="planning-group">
                    <div class="planning-group-label small text-muted-soft">`
                    + `копия ${UI.escapeHtml(run.index)} · attempt ${UI.escapeHtml(g.attempt)}`
                    + ` · round ${UI.escapeHtml(g.round)}</div>
                    ${questionsHtml}
                </div>`;
            }).join('');
            return `<div class="planning-run">${groupsHtml}</div>`;
        }

        // issue #93: compact-сводка разметки для summary planning-секции.
        // «полезных: X / оценено: Y · покрытие N%». При отсутствии review_summary
        // (нет оценок/старый индекс) — пустая строка, секция не ломается.
        function reviewSummaryBadgesHtml(report) {
            const rs = report.review_summary;
            if (!rs) return '';
            const parts = [
                `полезных: ${rs.useful ?? 0} / оценено: ${rs.reviewed ?? 0}`,
            ];
            if (typeof rs.coverage_percent === 'number') {
                parts.push(`покрытие ${rs.coverage_percent}%`);
            }
            return parts.map(t =>
                `<span class="badge rounded-pill badge-planning-count">${UI.escapeHtml(t)}</span>`
            ).join(' ');
        }

        function renderPlanningSection(report, canReview) {
            // Coding-отчёты (нет ключа planning) → секции нет вовсе.
            if (!report.planning) return '';
            const summary = report.planning_summary || {};
            const total = summary.questions ?? 0;

            // issue #96: неразмеченные вопросы этого отчёта + его report_id (из
            // review_key первого вопроса). Кнопка входа в Тиндер рендерится только
            // при canReview и наличии хотя бы одного неразмеченного.
            const allQuestions = (report.runs || []).flatMap(run => run.questions || []);
            const reportId = allQuestions.find(q => q && q.review_key)
                ? allQuestions.find(q => q && q.review_key).review_key.report_id : null;
            const unreviewed = allQuestions.filter(q => q && q.review_key && !q.review_verdict).length;
            const tinderEntryHtml = (canReview && reportId !== null && unreviewed > 0)
                ? `<button type="button" class="tinder-entry" data-report-id="${UI.escapeHtml(reportId)}">`
                    + `Разметить вопросы (${UI.escapeHtml(unreviewed)})</button>`
                : '';

            // Нет ни одного вопроса во всём отчёте → empty-state.
            if (total === 0) {
                return `<details class="planning-section" data-planning-section>
                    <summary>Уточняющие вопросы <span class="text-muted-soft">(0)</span></summary>
                    <div class="planning-body planning-empty small text-muted-soft">
                        Уточняющих вопросов не было
                    </div>
                </details>`;
            }

            const responder = report.planning.responder || '';
            // Сводка в summary видна всегда: вопросы / responder / fallbacks / ошибки.
            const summaryBadges = [
                `<span class="badge rounded-pill badge-planning-count">вопросов: ${UI.escapeHtml(total)}</span>`,
                `<span class="badge rounded-pill badge-planning-meta">responder: ${UI.escapeHtml(responder)}</span>`,
                `<span class="badge rounded-pill badge-planning-fallback">fallbacks: ${UI.escapeHtml(summary.fallbacks_to_first ?? 0)}</span>`,
                `<span class="badge rounded-pill badge-planning-error">reply errors: ${UI.escapeHtml(summary.reply_errors ?? 0)}</span>`,
            ].join(' ');
            // issue #93: сводка разметки (useful/reviewed/coverage) отдельным блоком.
            const reviewBadges = reviewSummaryBadgesHtml(report);

            const runsHtml = (report.runs || [])
                .map(run => planningRunHtml(run, canReview)).join('');

            return `<details class="planning-section" data-planning-section
                data-review-summary="${UI.escapeHtml(JSON.stringify(report.review_summary || null))}">
                <summary>Уточняющие вопросы ${summaryBadges}${reviewBadges ? ' ' + reviewBadges : ''}${tinderEntryHtml ? ' ' + tinderEntryHtml : ''}</summary>
                <div class="planning-body">${runsHtml}</div>
            </details>`;
        }

        function renderRunDetails(reports, canReview) {
            let html = `<section>
                <div class="mb-3">
                    <h2 class="section-heading mb-1">Детали прогонов</h2>
                    <div class="app-subtitle small">Каждая карточка показывает копии одного запуска.</div>
                </div>`;

            reports.forEach(report => {
                html += `<article class="premium-card p-4 mb-3">
                    <div class="d-flex flex-column flex-xl-row justify-content-between gap-3 mb-3">
                        <h3 class="run-card-title mb-0">${UI.escapeHtml(report.model)}</h3>
                        <div class="run-meta d-flex flex-wrap gap-3">
                            <span><strong>Дата:</strong> ${UI.escapeHtml(report.started_at_display)}</span>
                            <span><strong>Провайдер:</strong> ${UI.escapeHtml(report.provider)}</span>
                            <span><strong>Копий:</strong> ${UI.escapeHtml(report.copies)}</span>
                            <span><strong>Время:</strong> ${UI.fmtSecs(report.run_elapsed)}</span>
                            <span><strong>Цена:</strong> ${UI.formatPrice(report.pricing)}</span>
                            <span><strong>Токены:</strong> ${UI.fmtInt(report.usage_summary?.total_tokens)}</span>
                            <span><strong>Стоимость:</strong> ${UI.formatUsdCost(report.usage_summary?.estimated_cost_usd)}</span>
                        </div>
                    </div>
                    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-5 g-3">`;

                (report.runs || []).forEach(run => {
                    const status = UI.runStatus(run);
                    // Причину показываем только для неуспешных копий и только если
                    // она есть (старые отчёты без reason не ломаются).
                    const reasonHtml = (run.code !== 0 && run.reason)
                        ? `<div class="run-reason mt-2" title="${UI.escapeHtml(run.reason)}">${UI.escapeHtml(run.reason)}</div>`
                        : '';
                    html += `<div class="col">
                        <div class="run-tile ${status.className} h-100">
                            <div class="run-item-label mb-2">Копия ${UI.escapeHtml(run.index)}</div>
                            <div class="run-item-value mb-1">${UI.fmtSecs(run.elapsed)}</div>
                            <div class="small text-muted-soft mb-1">${UI.fmtInt(run.usage?.total_tokens)} ток.</div>
                            <div class="small text-muted-soft mb-2">${UI.formatUsdCost(run.usage?.estimated_cost_usd)}</div>
                            <span class="badge rounded-pill ${status.badgeClass}">${UI.escapeHtml(run.status || status.label)}</span>
                            ${reasonHtml}
                        </div>
                    </div>`;
                });

                html += '</div>';

                // Planning-секция — внутри карточки, после плиток копий.
                // Появляется только у planning-отчётов (есть ключ planning).
                html += renderPlanningSection(report, canReview);

                html += '</article>';
            });

            html += '</section>';
            return html;
        }

        function renderProject(project, canReview) {
            document.getElementById('subtitle').textContent = project.name;
            document.getElementById('projectTitle').textContent = project.name;
            document.title = `LLM Benchmark — ${project.name}`;

            const content = document.getElementById('content');
            UI.setLoaded(content);
            const reports = project.reports || [];

            // issue #96: запоминаем проект+capabilities для Тиндер-режима.
            _currentProject = project;
            _canReview = canReview;

            content.innerHTML =
                renderProjectInfo(project) +
                renderPrompt(project) +
                renderTinderProjectEntry(project, canReview) +
                renderComparison(reports) +
                renderRunDetails(reports, canReview);

            // issue #93/#96: навешиваем обработчики кнопок разметки (карточки #94 +
            // вход в Тиндер). Только локальный serve — на Pages canReview=false.
            if (canReview) {
                attachReviewHandlers();
                attachTinderEntryHandlers();
            }

            const rows = reports.map(report => {
                const elapsed = (report.runs || [])
                    .map(r => r.elapsed)
                    .filter(v => typeof v === 'number' && isFinite(v));
                return {
                    report,
                    avg: elapsed.length ? elapsed.reduce((s, e) => s + e, 0) / elapsed.length : null,
                    min: elapsed.length ? Math.min(...elapsed) : null,
                    max: elapsed.length ? Math.max(...elapsed) : null,
                };
            });
            const select = document.getElementById('sortSelect');
            const tbody = document.getElementById('comparisonBody');
            const renderRows = () => { tbody.innerHTML = comparisonRows(rows, select.value); };
            select.addEventListener('change', renderRows);
            renderRows();

            // issue #96: реакция на hash-маршрут Тиндера (прямой вход/reload).
            handleTinderHashRoute();
        }

        // --- issue #96: Тиндер-режим разметки неразмеченных вопросов ---
        //
        // Полноэкранный поток вопросов одного отчёта. Переиспользует review_key и
        // тот же PUT /api/question-reviews, что и кнопки в карточках (#94) —
        // НЕТ новых API/таблиц. Поток in-memory; при входе пересобирается из
        // загруженного index.json (неразмеченные = вопросы без review_verdict).
        // Навигация: ← = unnecessary, → = useful, Backspace/Esc = выход; клик по
        // стрелкам = то же действие. Все LLM-значения (промпт/header/вопрос/
        // options/answer) вставляются ТОЛЬКО через UI.escapeHtml.

        function attachTinderEntryHandlers() {
            // Карточные кнопки входа (per-отчёт): открывают поток по своему отчёту.
            document.querySelectorAll('.tinder-entry').forEach(btn => {
                if (btn.dataset.bound === '1') return;
                btn.dataset.bound = '1';
                btn.addEventListener('click', () => {
                    const reportId = parseInt(btn.dataset.reportId, 10);
                    if (Number.isFinite(reportId)) openTinder(reportId);
                });
            });
            // Верхняя кнопка «Разметить вопросы проекта» — поток по всему проекту.
            const projectBtn = document.getElementById('tinderEntryProject');
            if (projectBtn && projectBtn.dataset.bound !== '1') {
                projectBtn.dataset.bound = '1';
                projectBtn.addEventListener('click', openTinderProject);
            }
        }

        // Неразмеченные вопросы одного отчёта в порядке появления (копия/attempt/
        // round/question_idx). Берём их из загруженного проекта, а не из DOM карточек:
        // так источник правды один (index.json) и поток устойчив к сворачиванию
        // planning-секции.
        //
        // ВАЖНО: возвращаем САМИ объекты вопросов из _currentProject (а не их копии)
        // и приписываем _prompt/_model прямо на них. Тогда после успешного PUT в
        // tinderMark простановка review_verdict меняет исходный объект — и повторный
        // вход в Тиндер (без reload) уже не покажет размеченный вопрос, а карточные
        // кнопки #94 и счётчики остаются консистентны. _currentProject — ephemeral
        // in-memory (index.json на диск НЕ пишется), так что мутация безопасна.
        function collectUnreviewedFromReport(report) {
            const prompt = (report && report.prompt) || '';
            const model = (report && report.model) || '';
            const out = [];
            (report.runs || []).forEach(run => {
                (run.questions || []).forEach(q => {
                    if (!q || !q.review_key) return;
                    if (q.review_verdict) return;  // уже размечен — из потока
                    if (_pendingTinderReviews.has(reviewKeyId(q.review_key))) return;
                    q._prompt = prompt;
                    q._model = model;
                    out.push(q);
                });
            });
            return out;
        }

        // Неразмеченные вопросы ВСЕГО проекта: конкатенация по всем planning-отчётам
        // в порядке started_at (так их отдаёт index.json).
        function collectUnreviewedProject() {
            const out = [];
            (_currentProject.reports || []).forEach(report => {
                if (!report.planning) return;  // coding-отчёты — без вопросов
                out.push(...collectUnreviewedFromReport(report));
            });
            return out;
        }

        function reviewKeyId(key) {
            if (!key) return '';
            return JSON.stringify([
                key.report_id, key.run_idx, key.attempt_idx,
                key.request_id, key.question_idx,
            ]);
        }

        // После успешной разметки в Тиндере приводим кнопки входа в соответствие с
        // актуальным состоянием _currentProject (без reload): обновляем счётчик на
        // верхней проектной кнопке (или скрываем, когда всё размечено) и на карточных
        // кнопках каждого planning-отчёта. Если карточной/проектной кнопки на странице
        // нет (read-only Pages) — ничего не делаем.
        function refreshTinderEntries() {
            if (!_currentProject) return;
            const total = collectUnreviewedProject().length;
            const projectBtn = document.getElementById('tinderEntryProject');
            if (projectBtn) {
                if (total === 0) projectBtn.remove();
                else projectBtn.textContent = `Разметить вопросы проекта (${total})`;
            }
            document.querySelectorAll('.tinder-entry').forEach(btn => {
                const reportId = parseInt(btn.dataset.reportId, 10);
                const report = findReport(reportId);
                if (!report) return;
                const left = collectUnreviewedFromReport(report).length;
                if (left === 0) btn.remove();
                else btn.textContent = `Разметить вопросы (${left})`;
            });
        }

        function findReport(reportId) {
            if (!_currentProject) return null;
            return (_currentProject.reports || []).find(r => {
                const first = (r.runs || []).flatMap(run => run.questions || [])
                    .find(q => q && q.review_key);
                return first && first.review_key.report_id === reportId;
            }) || null;
        }

        // Вопрос в _currentProject по составному review_key. Связывает DOM-карточку
        // (#94) и поток Тиндера: после записи из любого источника мутируем один и
        // тот же объект, иначе карточка и Тиндер расходятся (cycle-review cycle 2).
        // Сравнение по пяти полям ключа (ровно PK agent_questions).
        function findQuestionByKey(key) {
            if (!_currentProject || !key) return null;
            for (const report of _currentProject.reports || []) {
                for (const run of report.runs || []) {
                    for (const q of run.questions || []) {
                        const rk = q && q.review_key;
                        if (!rk) continue;
                        if (rk.report_id === key.report_id
                            && rk.run_idx === key.run_idx
                            && rk.attempt_idx === key.attempt_idx
                            && rk.request_id === key.request_id
                            && rk.question_idx === key.question_idx) {
                            return q;
                        }
                    }
                }
            }
            return null;
        }

        // DOM-карточка разметки #94 по review_key (data-review-key хранит JSON ключа).
        function findReviewBoxByKey(key) {
            const want = JSON.stringify(key);
            return Array.from(document.querySelectorAll('.planning-review'))
                .find(b => b.dataset.reviewKey === want) || null;
        }

        // Единая reconciliation после успешной записи verdict (PUT или DELETE) из
        // ЛЮБОГО источника — карточной кнопки #94 или Тиндера. Мутирует объект вопроса
        // в _currentProject (чтобы другой режим без reload видел новое состояние) и
        // обновляет DOM карточки (#94) + счётчики входа Тиндера.
        function reconcileReviewVerdict(key, verdict) {
            const q = findQuestionByKey(key);
            if (q) q.review_verdict = verdict || undefined;
            const box = findReviewBoxByKey(key);
            if (box) applyReviewVerdict(box, verdict || null);
            refreshTinderEntries();
        }

        // Поток по неразмеченным вопросам ОДНОГО отчёта (карточный вход).
        function openTinder(reportId) {
            const report = findReport(reportId);
            if (!report) return;
            _tinder.gen += 1;  // инвалидация любого pending mark прежнего потока
            _tinder.scope = 'report';
            _tinder.reportId = reportId;
            _tinder.questions = collectUnreviewedFromReport(report);
            _tinder.idx = 0;
            _tinder.busy = false;
            location.hash = `#/review/${reportId}`;
            showTinder();
        }

        // Поток по неразмеченным вопросам ВСЕГО проекта (верхняя кнопка).
        function openTinderProject() {
            _tinder.gen += 1;  // инвалидация любого pending mark прежнего потока
            _tinder.scope = 'project';
            _tinder.reportId = null;
            _tinder.questions = collectUnreviewedProject();
            _tinder.idx = 0;
            _tinder.busy = false;
            location.hash = '#/review/project';
            showTinder();
        }

        function showTinder() {
            const overlay = document.getElementById('tinderOverlay');
            if (!_tinder.scope) return;
            renderTinderScreen(overlay);
            overlay.hidden = false;
            overlay.focus();
        }

        function renderTinderScreen(overlay) {
            if (_tinder.idx >= _tinder.questions.length) {
                overlay.innerHTML = tinderDoneHtml();
                return;
            }
            overlay.innerHTML = tinderQuestionHtml(_tinder.questions[_tinder.idx]);
        }

        function tinderQuestionHtml(question) {
            // prompt/header/вопрос/options/answer — экранированы; review_key —
            // данные для API. В проектном потоке сверху дополнительно подпись модели
            // (вопросы разных моделей идут вперемешку) — для контекста.
            const keyAttr = UI.escapeHtml(JSON.stringify(question.review_key));
            const prompt = question._prompt || '';
            const promptHtml = prompt
                ? `<div class="tinder-prompt task-text">${UI.renderPromptText(prompt)}</div>`
                : '';
            const modelHtml = _tinder.scope === 'project' && question._model
                ? `<div class="tinder-model small text-muted-soft">${UI.escapeHtml(question._model)}</div>`
                : '';
            const headerHtml = question.header
                ? `<div class="tinder-q-header">${UI.escapeHtml(question.header)}</div>`
                : '';
            const optionsHtml = (question.options || [])
                .map(opt => {
                    const label = String((opt && opt.label != null ? opt.label : '') ?? '');
                    const answer = new Set((question.answer || []).map(String));
                    const selected = answer.has(label) ? ' is-selected' : '';
                    return `<li class="planning-option${selected}">${UI.escapeHtml(label)}</li>`;
                }).join('');
            const leftNum = _tinder.idx + 1;
            const total = _tinder.questions.length;
            return `<div class="tinder-screen tinder-current" data-review-key="${keyAttr}">
                ${modelHtml}
                ${promptHtml}
                <div class="tinder-q">
                    ${headerHtml}
                    <div class="tinder-q-text">${UI.escapeHtml(question.question || '')}</div>
                    <ul class="tinder-options planning-options list-unstyled">${optionsHtml}</ul>
                </div>
                <div class="tinder-progress small text-muted-soft">вопрос ${UI.escapeHtml(leftNum)} из ${UI.escapeHtml(total)}</div>
                <div class="tinder-arrows">
                    <button type="button" class="tinder-arrow" data-verdict="unnecessary"
                        aria-label="Лишний (стрелка влево)">
                        <span class="tinder-arrow-glyph">&larr;</span>
                        <span class="tinder-arrow-label">Лишний</span>
                    </button>
                    <a href="#" class="tinder-back" data-tinder-back="1">вернуться назад</a>
                    <button type="button" class="tinder-arrow" data-verdict="useful"
                        aria-label="Полезный (стрелка вправо)">
                        <span class="tinder-arrow-glyph">&rarr;</span>
                        <span class="tinder-arrow-label">Полезный</span>
                    </button>
                </div>
            </div>`;
        }

        function tinderDoneHtml() {
            return `<div class="tinder-screen tinder-done">
                <div class="tinder-done-title">Всё размечено</div>
                <a href="#" class="tinder-back" data-tinder-back="1">вернуться назад</a>
            </div>`;
        }

        async function tinderMark(verdict) {
            if (_tinder.busy) return;
            if (_tinder.idx >= _tinder.questions.length) return;
            const question = _tinder.questions[_tinder.idx];
            const key = question.review_key;
            const keyId = reviewKeyId(key);
            const overlay = document.getElementById('tinderOverlay');
            // Defensive path: stale DOM не должен повторно отправлять уже
            // размеченный или находящийся в полёте review_key.
            if (question.review_verdict || _pendingTinderReviews.has(keyId)) {
                _tinder.questions.splice(_tinder.idx, 1);
                renderTinderScreen(overlay);
                return;
            }
            // Краткая подсветка стрелки в момент запроса (как индикатор сохранения #94).
            const arrow = overlay.querySelector(
                `.tinder-arrow[data-verdict="${verdict}"]`);
            if (arrow) {
                arrow.classList.add('is-selected');
                arrow.setAttribute('aria-pressed', 'true');
            }
            _tinder.busy = true;
            _pendingTinderReviews.add(keyId);
            // generation-token: если пользователь выйдет во время PUT (exitTinder
            // инкрементит gen) или откроет другой поток, позднее completion НЕ должно
            // мутировать новый поток (иначе скип вопроса / повторный PUT). Захватываем
            // gen до await и проверяем после — cycle-review cycle 2, race finding.
            const gen = _tinder.gen;
            try {
                const resp = await fetch('/api/question-reviews', {
                    method: 'PUT',
                    body: JSON.stringify({ ...key, verdict }),
                    headers: { 'Content-Type': 'application/json' },
                });
                if (!resp.ok) {
                    let detail = `HTTP ${resp.status}`;
                    try {
                        const payload = await resp.json();
                        if (payload && payload.error) detail = payload.error;
                    } catch (_e) { /* keep HTTP status */ }
                    throw new Error(detail);
                }
                // PUT завершён в БД в любом случае. Обновляем _currentProject + DOM
                // карточки #94 единым reconciliation (чтобы карточка без reload
                // отражала verdict, а не stale-состояние).
                reconcileReviewVerdict(key, verdict);
                // Локальное состояние потока меняем ТОЛЬКО если этот mark ещё актуален
                // (тот же gen, та же позиция, тот же вопрос). Иначе поток уже сменился
                // (exit/reopen) — поздний completion игнорируем, не инкрементируя idx
                // чужого потока и не перерисовывая overlay.
                if (_tinder.gen === gen && _tinder.questions[_tinder.idx] === question) {
                    _tinder.idx += 1;
                    renderTinderScreen(overlay);
                }
            } catch (err) {
                // Ошибка: остаёмся на вопросе, снимаем подсветку — но только если
                // поток ещё наш (иначе overlay уже скрыт/перерисован другим потоком).
                if (_tinder.gen === gen && arrow) {
                    arrow.classList.remove('is-selected');
                    arrow.removeAttribute('aria-pressed');
                    tinderShowError(overlay, `Не сохранить: ${err.message}`);
                }
            } finally {
                _pendingTinderReviews.delete(keyId);
                if (_tinder.gen === gen) _tinder.busy = false;
                // При stale-ошибке вопрос снова считается неразмеченным; кнопки
                // входа должны показать актуальное количество при следующем входе.
                refreshTinderEntries();
            }
        }

        function tinderShowError(overlay, message) {
            let el = overlay.querySelector('.tinder-error');
            if (!el) {
                el = document.createElement('div');
                el.className = 'tinder-error badge-planning-error';
                const screen = overlay.querySelector('.tinder-screen');
                if (screen) screen.appendChild(el);
            }
            // textContent — экранирование на уровне DOM (XSS невозможен).
            el.textContent = message;
        }

        function exitTinder() {
            const overlay = document.getElementById('tinderOverlay');
            overlay.hidden = true;
            overlay.innerHTML = '';
            // gen += 1: любой pending tinderMark видит смену gen и НЕ трогает
            // idx/render/arrow/busy — позднее completion выхода во время PUT не
            // повредит новому потоку (cycle-review cycle 2, race finding).
            _tinder.gen += 1;
            _tinder.scope = null;
            _tinder.reportId = null;
            _tinder.questions = [];
            _tinder.idx = 0;
            _tinder.busy = false;
            // Чистим hash без скролла/перезагрузки.
            if (location.hash.startsWith('#/review/')) {
                history.replaceState(null, '', location.pathname + location.search);
            }
        }

        // Клавиатура: ← = unnecessary, → = useful, Backspace/Esc = выход.
        // Клик/Backspace-по-ссылке считаем через data-tinder-back. Стрелки-кнопки
        // ловим через делегирование кликов.
        function onTinderKeyDown(ev) {
            const overlay = document.getElementById('tinderOverlay');
            if (overlay.hidden) return;
            if (ev.key === 'ArrowRight') { ev.preventDefault(); tinderMark('useful'); }
            else if (ev.key === 'ArrowLeft') { ev.preventDefault(); tinderMark('unnecessary'); }
            else if (ev.key === 'Backspace') { ev.preventDefault(); exitTinder(); }
            else if (ev.key === 'Escape') { ev.preventDefault(); exitTinder(); }
        }

        function onTinderClick(ev) {
            const overlay = document.getElementById('tinderOverlay');
            if (overlay.hidden) return;
            const arrow = ev.target.closest('.tinder-arrow');
            if (arrow) {
                ev.preventDefault();
                tinderMark(arrow.dataset.verdict);
                return;
            }
            if (ev.target.closest('[data-tinder-back]')) {
                ev.preventDefault();
                exitTinder();
            }
        }

        function handleTinderHashRoute() {
            // Прямой вход/reload по hash-маршруту: #/review/project или
            // #/review/<reportId>. Если overlay уже открыт — ничего не делаем
            // (вызвавший сам поставил hash). На read-only GitHub Pages (_canReview
            // === false) маршрут игнорируем: overlay без API записи бесполезен и
            // не должен открываться по crafted hash.
            if (!_canReview) return;
            if (location.hash === '#/review/project') {
                if (document.getElementById('tinderOverlay').hidden) openTinderProject();
                return;
            }
            const m = /^#\/review\/(\d+)$/.exec(location.hash);
            if (m && document.getElementById('tinderOverlay').hidden) {
                openTinder(parseInt(m[1], 10));
            }
        }

        window.addEventListener('hashchange', handleTinderHashRoute);
        document.addEventListener('keydown', onTinderKeyDown);
        document.getElementById('tinderOverlay').addEventListener('click', onTinderClick);

        loadData();
    </script>
</body>
</html>
